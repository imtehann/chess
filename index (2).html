<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>REGIS — Cinematic Chess</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Cinzel:wght@400;500;600&family=Cinzel+Decorative:wght@400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ====== MENU SCREEN ====== -->
  <div id="menu-screen" class="screen active">
    <canvas id="menu-canvas"></canvas>
    <div class="menu-content">
      <div class="logo-area">
        <div class="logo-crown">♛</div>
        <h1 class="logo-title">REGIS</h1>
        <p class="logo-subtitle">Cinematic Chess Experience</p>
      </div>
      <div class="menu-buttons">
        <button class="menu-btn primary" id="btn-pvai">
          <span class="btn-icon">⚔</span>
          <span class="btn-label">Player vs AI</span>
          <span class="btn-sub">Challenge Stockfish</span>
        </button>
        <button class="menu-btn" id="btn-pvp">
          <span class="btn-icon">⚔</span>
          <span class="btn-label">Player vs Player</span>
          <span class="btn-sub">Local Multiplayer</span>
        </button>
        <button class="menu-btn" id="btn-analysis">
          <span class="btn-icon">◈</span>
          <span class="btn-label">Analysis Board</span>
          <span class="btn-sub">Study & Review</span>
        </button>
      </div>
      <div class="menu-season-bar">
        <span class="season-label">Environment</span>
        <div class="season-pills">
          <button class="season-pill active" data-season="autumn">🍂 Autumn</button>
          <button class="season-pill" data-season="winter">❄ Winter</button>
          <button class="season-pill" data-season="summer">☀ Summer</button>
          <button class="season-pill" data-season="rain">⛈ Monsoon</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ====== SETUP SCREEN ====== -->
  <div id="setup-screen" class="screen">
    <canvas id="setup-canvas"></canvas>
    <div class="setup-content glass-panel">
      <h2 class="panel-title">Game Setup</h2>
      <div class="setup-row" id="color-row">
        <label class="setup-label">Play as</label>
        <div class="toggle-group">
          <button class="toggle-btn active" data-val="white">♔ White</button>
          <button class="toggle-btn" data-val="random">⚄ Random</button>
          <button class="toggle-btn" data-val="black">♚ Black</button>
        </div>
      </div>
      <div class="setup-row" id="diff-row">
        <label class="setup-label">AI Difficulty</label>
        <div class="difficulty-slider-wrap">
          <input type="range" id="diff-slider" min="1" max="20" value="10" />
          <div class="diff-labels">
            <span>Novice</span><span id="diff-val">10</span><span>Master</span>
          </div>
        </div>
      </div>
      <div class="setup-row">
        <label class="setup-label">Time Control</label>
        <div class="toggle-group">
          <button class="toggle-btn active" data-val="none">∞ Unlimited</button>
          <button class="toggle-btn" data-val="5">5 min</button>
          <button class="toggle-btn" data-val="10">10 min</button>
          <button class="toggle-btn" data-val="15">15 min</button>
        </div>
      </div>
      <div class="setup-actions">
        <button class="action-btn secondary" id="btn-back-menu">← Back</button>
        <button class="action-btn primary" id="btn-start-game">Begin Game →</button>
      </div>
    </div>
  </div>

  <!-- ====== GAME SCREEN ====== -->
  <div id="game-screen" class="screen">
    <!-- Environment Layer -->
    <canvas id="env-canvas"></canvas>

    <!-- Left Panel -->
    <div class="side-panel left-panel">
      <div class="player-card" id="player-black-card">
        <div class="player-avatar">♚</div>
        <div class="player-info">
          <span class="player-name" id="black-name">Black</span>
          <span class="player-timer" id="black-timer">—</span>
        </div>
        <div class="captured-pieces" id="captured-by-white"></div>
      </div>

      <div class="eval-bar-container">
        <div class="eval-label" id="eval-label-top">+0.0</div>
        <div class="eval-bar-wrap">
          <div class="eval-bar" id="eval-bar">
            <div class="eval-fill white" id="eval-fill-white"></div>
            <div class="eval-fill black" id="eval-fill-black"></div>
          </div>
        </div>
        <div class="eval-label" id="eval-label-bot">+0.0</div>
      </div>

      <div class="player-card" id="player-white-card">
        <div class="player-avatar">♔</div>
        <div class="player-info">
          <span class="player-name" id="white-name">You</span>
          <span class="player-timer" id="white-timer">—</span>
        </div>
        <div class="captured-pieces" id="captured-by-black"></div>
      </div>
    </div>

    <!-- Board Container -->
    <div class="board-container">
      <div class="board-perspective-wrap">
        <canvas id="board-canvas"></canvas>
        <div id="piece-layer"></div>
        <div id="overlay-layer"></div>
      </div>
      <div class="board-controls">
        <button class="ctrl-btn" id="btn-flip" title="Flip Board">⇅</button>
        <button class="ctrl-btn" id="btn-undo" title="Undo">↩</button>
        <button class="ctrl-btn" id="btn-redo" title="Redo">↪</button>
        <button class="ctrl-btn" id="btn-restart" title="New Game">⟳</button>
        <button class="ctrl-btn" id="btn-menu" title="Menu">☰</button>
      </div>
    </div>

    <!-- Right Panel -->
    <div class="side-panel right-panel">
      <div class="move-list-container">
        <div class="panel-header">
          <span>Move History</span>
          <button class="icon-btn" id="btn-pgn-export" title="Export PGN">⬇</button>
        </div>
        <div id="move-list" class="move-list"></div>
      </div>

      <div class="engine-panel">
        <div class="panel-header">
          <span>Engine Analysis</span>
          <div class="engine-status" id="engine-status">
            <span class="status-dot"></span>
            <span id="engine-status-text">Loading...</span>
          </div>
        </div>
        <div class="best-move-line" id="best-move-display">
          <span class="bm-label">Best Move</span>
          <span class="bm-move" id="best-move-text">—</span>
        </div>
        <div id="engine-lines" class="engine-lines"></div>
      </div>

      <div class="season-switcher">
        <span class="ss-label">Environment</span>
        <div class="ss-buttons">
          <button class="ss-btn active" data-season="autumn" title="Autumn">🍂</button>
          <button class="ss-btn" data-season="winter" title="Winter">❄</button>
          <button class="ss-btn" data-season="summer" title="Summer">☀</button>
          <button class="ss-btn" data-season="rain" title="Monsoon">⛈</button>
        </div>
      </div>
    </div>

    <!-- Move Quality Popup -->
    <div id="move-quality-popup" class="move-quality-popup hidden">
      <span id="mqp-icon"></span>
      <span id="mqp-label"></span>
    </div>
  </div>

  <!-- ====== ANALYSIS SCREEN ====== -->
  <div id="analysis-screen" class="screen">
    <canvas id="analysis-env-canvas"></canvas>
    <div class="analysis-layout">
      <div class="analysis-board-col">
        <canvas id="analysis-board-canvas"></canvas>
        <div id="analysis-piece-layer"></div>
        <div id="analysis-overlay-layer"></div>
        <div class="analysis-nav">
          <button class="ctrl-btn" id="a-first">⏮</button>
          <button class="ctrl-btn" id="a-prev">◀</button>
          <button class="ctrl-btn" id="a-next">▶</button>
          <button class="ctrl-btn" id="a-last">⏭</button>
          <button class="ctrl-btn" id="a-flip">⇅</button>
        </div>
      </div>
      <div class="analysis-info-col">
        <div class="analysis-header glass-panel">
          <h2 id="analysis-title">Game Analysis</h2>
          <div class="accuracy-row">
            <div class="accuracy-card white-acc">
              <span class="acc-label">White</span>
              <span class="acc-val" id="white-accuracy">—</span>
              <span class="acc-unit">% accuracy</span>
            </div>
            <div class="accuracy-card black-acc">
              <span class="acc-label">Black</span>
              <span class="acc-val" id="black-accuracy">—</span>
              <span class="acc-unit">% accuracy</span>
            </div>
          </div>
        </div>
        <div class="eval-graph-container glass-panel">
          <canvas id="eval-graph-canvas" width="400" height="140"></canvas>
        </div>
        <div class="analysis-moves-panel glass-panel">
          <div id="analysis-move-list" class="move-list"></div>
        </div>
        <div class="pgn-panel glass-panel">
          <div class="panel-header">
            <span>PGN</span>
            <button class="icon-btn" id="btn-pgn-copy">Copy</button>
          </div>
          <textarea id="pgn-textarea" readonly></textarea>
        </div>
        <div class="analysis-actions">
          <button class="action-btn secondary" id="btn-back-from-analysis">← Back to Menu</button>
          <button class="action-btn primary" id="btn-analyze-run">Run Full Analysis</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ====== PROMOTION DIALOG ====== -->
  <div id="promotion-dialog" class="dialog-overlay hidden">
    <div class="dialog-box glass-panel">
      <h3>Promote Pawn</h3>
      <div class="promo-pieces" id="promo-pieces"></div>
    </div>
  </div>

  <!-- ====== GAME OVER DIALOG ====== -->
  <div id="gameover-dialog" class="dialog-overlay hidden">
    <div class="dialog-box glass-panel gameover-box">
      <div class="gameover-icon" id="go-icon">♛</div>
      <h2 id="go-title">Game Over</h2>
      <p id="go-subtitle"></p>
      <div class="gameover-stats" id="go-stats"></div>
      <div class="gameover-actions">
        <button class="action-btn secondary" id="go-analyze">Analyze Game</button>
        <button class="action-btn primary" id="go-rematch">New Game</button>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="engine.js"></script>
  <script src="board.js"></script>
  <script src="effects.js"></script>
  <script src="ui.js"></script>
  <script src="main.js"></script>
</body>
</html>
