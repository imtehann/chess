<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Simple Chess AI</title>

  <script src="https://cdn.jsdelivr.net/npm/chess.js@0.10.3/chess.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/stockfish@16.1.0/stockfish.js"></script>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #222;
      color: white;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(8, 60px);
      width: 480px;
      margin: 20px auto;
    }

    .square {
      width: 60px;
      height: 60px;
      font-size: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .light { background: #f0d9b5; }
    .dark { background: #b58863; }

    button {
      padding: 10px 20px;
      margin: 10px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h2>♟️ Chess vs AI</h2>

<button onclick="resetGame()">Restart</button>

<div id="board"></div>

<script>
const game = new Chess();
const board = document.getElementById("board");

let selected = null;
let engine = new Worker("https://cdn.jsdelivr.net/npm/stockfish@16.1.0/stockfish.js");

function renderBoard() {
  board.innerHTML = "";
  const position = game.board();

  for (let r = 0; r < 8; r++) {
    for (let c = 0; c < 8; c++) {
      const square = document.createElement("div");
      square.className = "square " + ((r + c) % 2 ? "dark" : "light");

      const piece = position[r][c];
      if (piece) {
        square.textContent = getPieceSymbol(piece);
      }

      const sq = "abcdefgh"[c] + (8 - r);
      square.onclick = () => handleClick(sq);

      board.appendChild(square);
    }
  }
}

function getPieceSymbol(p) {
  const symbols = {
    p: "♟", r: "♜", n: "♞",
    b: "♝", q: "♛", k: "♚"
  };
  return p.color === "w"
    ? symbols[p.type].toUpperCase()
    : symbols[p.type];
}

function handleClick(square) {
  if (!selected) {
    selected = square;
  } else {
    const move = game.move({
      from: selected,
      to: square,
      promotion: "q"
    });

    selected = null;

    if (move) {
      renderBoard();
      setTimeout(aiMove, 200);
    }
  }
}

function aiMove() {
  engine.postMessage("position fen " + game.fen());
  engine.postMessage("go depth 10");

  engine.onmessage = function(e) {
    if (e.data.startsWith("bestmove")) {
      const move = e.data.split(" ")[1];
      game.move({
        from: move.substring(0,2),
        to: move.substring(2,4),
        promotion: "q"
      });
      renderBoard();
    }
  };
}

function resetGame() {
  game.reset();
  renderBoard();
}

renderBoard();
</script>

</body>
</html>
