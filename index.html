<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Royal Chess | Fully Playable 2.5D with Stockfish AI & PGN Analysis</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', 'Playfair Display', serif;
        }
        .ui-container {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 30;
        }
        .glass-card {
            background: rgba(20, 25, 35, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            border: 1px solid rgba(255, 215, 150, 0.5);
            box-shadow: 0 12px 30px rgba(0,0,0,0.3);
            padding: 10px 18px;
            pointer-events: auto;
        }
        .top-bar {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
        }
        .btn-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        button, .theme-option {
            background: linear-gradient(135deg, #2c2f3a, #1a1c26);
            border: none;
            color: #f2e8d5;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        button:hover {
            background: linear-gradient(135deg, #4a4e62, #2a2e3e);
            transform: translateY(-2px);
            color: #ffeaaf;
        }
        .status-badge {
            background: #0f121cee;
            border-radius: 40px;
            padding: 6px 24px;
            font-weight: bold;
            font-size: 1rem;
            border-left: 4px solid goldenrod;
            font-family: monospace;
        }
        .analysis-panel {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 360px;
            max-height: 60vh;
            overflow-y: auto;
            background: rgba(8, 10, 18, 0.85);
            backdrop-filter: blur(16px);
            border-radius: 28px;
            padding: 18px;
            border: 1px solid rgba(255,200,100,0.5);
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
        }
        .analysis-panel h3 {
            margin: 0 0 12px 0;
            color: #ffda88;
        }
        .move-list {
            max-height: 240px;
            overflow-y: auto;
            background: #06080faa;
            border-radius: 20px;
            padding: 8px;
            margin-top: 12px;
        }
        .move-entry {
            display: flex;
            justify-content: space-between;
            padding: 6px 10px;
            border-bottom: 1px solid #2e3246;
        }
        .classification { font-weight: bold; }
        .brilliant { color: #ffd966; }
        .great { color: #a0ffb0; }
        .good { color: #7bc5ff; }
        .inaccuracy { color: #ffb347; }
        .mistake { color: #ff7b4a; }
        .blunder { color: #ff5e5e; }
        textarea, input {
            background: #1a1e2c;
            border: 1px solid #6d7f8c;
            color: #f0f0f0;
            border-radius: 20px;
            padding: 10px;
            width: calc(100% - 24px);
            font-family: monospace;
        }
        .flex-row {
            display: flex;
            gap: 12px;
            margin-top: 12px;
        }
        hr { border-color: #ffcd7e55; margin: 8px 0; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #11131f; }
        ::-webkit-scrollbar-thumb { background: #dba843; border-radius: 10px; }
        input[type="range"] { width: 140px; background: #2e3347; }
    </style>
</head>
<body>
<div class="ui-container">
    <div class="top-bar">
        <div class="glass-card btn-group">
            <button id="restartBtn">♻️ Restart</button>
            <button id="aiToggleBtn">🤖 vs AI</button>
            <button id="pvpBtn">👥 PvP</button>
            <div style="display: flex; align-items: center; gap: 10px;">
                <span>🎚️ Skill</span>
                <input type="range" id="skillSlider" min="0" max="20" step="1" value="14">
            </div>
            <span id="gameStatus" class="status-badge">White's Turn</span>
        </div>
        <div class="glass-card btn-group">
            <button id="themeNormal">🌿 Verdant</button>
            <button id="themeAutumn">🍂 Autumn</button>
            <button id="themeCherry">🌸 Sakura</button>
            <button id="themeRainy">🌧️ Misty</button>
        </div>
    </div>
    <div class="analysis-panel">
        <h3>📜 PGN Game Analysis (Stockfish)</h3>
        <textarea id="pgnInput" rows="2" placeholder="Paste PGN here... 1. e4 e5 2. Nf3 Nc6 ..."></textarea>
        <div class="flex-row">
            <input type="file" id="pgnUpload" accept=".pgn">
            <button id="analyzeBtn">Analyze 🔍</button>
        </div>
        <div id="moveListAnalysis" class="move-list">✨ Paste a PGN and click Analyze for move classification.</div>
    </div>
</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/",
            "chess.js": "https://cdn.skypack.dev/chess.js@0.10.3",
            "@tweenjs/tween.js": "https://unpkg.com/@tweenjs/tween.js@23.1.1/dist/tween.esm.js"
        }
    }
</script>
<script src="https://cdn.jsdelivr.net/npm/stockfish@16.1.0/stockfish.js"></script>
<script type="module">
    import * as THREE from 'three';
    import * as TWEEN from '@tweenjs/tween.js';
    import { Chess } from 'chess.js';

    // --- Setup Scene ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x081a2c);
    scene.fog = new THREE.FogExp2(0x081a2c, 0.008);
    const camera = new THREE.PerspectiveCamera(42, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(7.2, 7.8, 8.5);
    camera.lookAt(0, 0.6, 0);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    // --- Lighting ---
    const ambient = new THREE.AmbientLight(0x445566, 0.6);
    scene.add(ambient);
    const keyLight = new THREE.DirectionalLight(0xfff5dd, 1.2);
    keyLight.position.set(5, 12, 4);
    keyLight.castShadow = true;
    keyLight.shadow.mapSize.width = 1024;
    keyLight.shadow.mapSize.height = 1024;
    scene.add(keyLight);
    const fillLight = new THREE.PointLight(0xccaa88, 0.5);
    fillLight.position.set(-2, 5, 4);
    scene.add(fillLight);
    const rimLight = new THREE.PointLight(0x88aaff, 0.4);
    rimLight.position.set(1, 4, -6);
    scene.add(rimLight);

    // --- Ground & Environment ---
    const groundMat = new THREE.MeshStandardMaterial({ color: 0x5c9e3e, roughness: 0.85 });
    const groundPlane = new THREE.Mesh(new THREE.PlaneGeometry(24, 24), groundMat);
    groundPlane.rotation.x = -Math.PI / 2;
    groundPlane.position.y = -0.5;
    groundPlane.receiveShadow = true;
    scene.add(groundPlane);
    // Simple trees
    function addTree(x, z) {
        const group = new THREE.Group();
        const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.8, 1.5, 8), new THREE.MeshStandardMaterial({ color: 0x8b5a2b }));
        trunk.position.y = 0.75;
        trunk.castShadow = true;
        const foliage = new THREE.Mesh(new THREE.ConeGeometry(0.9, 1.2, 8), new THREE.MeshStandardMaterial({ color: 0x6aae4a }));
        foliage.position.y = 1.6;
        group.add(trunk, foliage);
        group.position.set(x, -0.45, z);
        scene.add(group);
    }
    [[-7, -6], [7.5, -6.5], [-7.8, 5.5], [8, 6], [-5, -8], [6, 7.5]].forEach(p => addTree(p[0], p[1]));

    // --- Chessboard (elegant tiles) ---
    const tileSize = 1.25;
    const squareMeshes = new Map(); // square name -> tile mesh
    const lightMat = new THREE.MeshStandardMaterial({ color: 0xe3d8bf, roughness: 0.35 });
    const darkMat = new THREE.MeshStandardMaterial({ color: 0x9c7e5c, roughness: 0.4 });
    for (let i = 0; i < 8; i++) {
        for (let j = 0; j < 8; j++) {
            const isLight = (i + j) % 2 === 0;
            const tile = new THREE.Mesh(new THREE.BoxGeometry(tileSize, 0.1, tileSize), isLight ? lightMat : darkMat);
            const x = (j - 3.5) * tileSize;
            const z = (i - 3.5) * tileSize;
            tile.position.set(x, -0.25, z);
            tile.receiveShadow = true;
            scene.add(tile);
            const sq = `${String.fromCharCode(97 + j)}${8 - i}`;
            squareMeshes.set(sq, tile);
        }
    }

    // --- Piece Models (smooth, metallic) ---
    function createPiece(type, color) {
        const group = new THREE.Group();
        const isWhite = color === 'w';
        const mainMat = new THREE.MeshStandardMaterial({ color: isWhite ? 0xf5f0e6 : 0x2e2b28, metalness: 0.7, roughness: 0.25 });
        const goldMat = new THREE.MeshStandardMaterial({ color: 0xdbb45c, metalness: 0.85 });
        const base = new THREE.Mesh(new THREE.CylinderGeometry(0.52, 0.58, 0.24, 32), mainMat);
        base.position.y = 0.13;
        group.add(base);
        if (type === 'p') {
            const body = new THREE.Mesh(new THREE.SphereGeometry(0.44, 32, 32), mainMat);
            body.position.y = 0.62;
            group.add(body);
            const ring = new THREE.Mesh(new THREE.TorusGeometry(0.38, 0.06, 16, 48), goldMat);
            ring.position.y = 0.84;
            ring.rotation.x = Math.PI/2;
            group.add(ring);
        } else if (type === 'n') {
            const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.41, 0.5, 0.62, 24), mainMat);
            neck.position.y = 0.55;
            group.add(neck);
            const head = new THREE.Mesh(new THREE.ConeGeometry(0.52, 0.72, 8), mainMat);
            head.position.y = 0.96;
            group.add(head);
        } else if (type === 'b') {
            const torso = new THREE.Mesh(new THREE.CylinderGeometry(0.48, 0.56, 0.82, 32), mainMat);
            torso.position.y = 0.58;
            group.add(torso);
            const hat = new THREE.Mesh(new THREE.ConeGeometry(0.38, 0.6, 16), goldMat);
            hat.position.y = 1.02;
            group.add(hat);
        } else if (type === 'r') {
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.78, 0.72, 0.78), mainMat);
            body.position.y = 0.52;
            group.add(body);
            const top = new THREE.Mesh(new THREE.TorusGeometry(0.48, 0.09, 16, 48), goldMat);
            top.position.y = 0.92;
            top.rotation.x = Math.PI/2;
            group.add(top);
        } else if (type === 'q') {
            const body = new THREE.Mesh(new THREE.CylinderGeometry(0.54, 0.62, 0.94, 32), mainMat);
            body.position.y = 0.62;
            group.add(body);
            const jewel = new THREE.Mesh(new THREE.SphereGeometry(0.28, 24), goldMat);
            jewel.position.y = 1.12;
            group.add(jewel);
        } else if (type === 'k') {
            const body = new THREE.Mesh(new THREE.CylinderGeometry(0.56, 0.64, 0.98, 32), mainMat);
            body.position.y = 0.64;
            group.add(body);
            const cross = new THREE.Mesh(new THREE.BoxGeometry(0.32, 0.32, 0.32), goldMat);
            cross.position.y = 1.18;
            group.add(cross);
            const orb = new THREE.Mesh(new THREE.SphereGeometry(0.2, 24), goldMat);
            orb.position.y = 1.36;
            group.add(orb);
        }
        group.castShadow = true;
        return group;
    }

    const chess = new Chess();
    let pieceMap = new Map(); // square -> mesh
    function getPosition(sq) {
        const f = sq.charCodeAt(0) - 97;
        const r = parseInt(sq[1]) - 1;
        return { x: (f - 3.5) * tileSize, z: (r - 3.5) * tileSize };
    }
    function rebuildBoard() {
        pieceMap.forEach(m => scene.remove(m));
        pieceMap.clear();
        const board = chess.board();
        for (let r = 0; r < 8; r++) {
            for (let f = 0; f < 8; f++) {
                const p = board[r][f];
                if (p) {
                    const sq = `${String.fromCharCode(97+f)}${8-r}`;
                    const mesh = createPiece(p.type, p.color);
                    const { x, z } = getPosition(sq);
                    mesh.position.set(x, 0.08, z);
                    scene.add(mesh);
                    pieceMap.set(sq, mesh);
                }
            }
        }
    }

    // --- Hand Animation ---
    const handGroup = new THREE.Group();
    const handMat = new THREE.MeshStandardMaterial({ color: 0xfacd9b });
    const palm = new THREE.Mesh(new THREE.SphereGeometry(0.3, 24, 24), handMat);
    const finger = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.13, 0.5, 6), handMat);
    finger.position.set(0.22, 0.22, 0.2);
    finger.rotation.z = -0.45;
    handGroup.add(palm, finger);
    handGroup.visible = false;
    scene.add(handGroup);
    let animating = false;
    async function animatePieceMove(from, to) {
        if (animating) return false;
        animating = true;
        const piece = pieceMap.get(from);
        if (!piece) { animating = false; return false; }
        const start = getPosition(from);
        const end = getPosition(to);
        handGroup.visible = true;
        handGroup.position.set(start.x, 0.5, start.z);
        const obj = { x: start.x, z: start.z, y: 0.5, py: piece.position.y };
        const target = { x: end.x, z: end.z, y: 0.5, py: 0.08 };
        const tween = new TWEEN.Tween(obj).to(target, 320).easing(TWEEN.Easing.Back.InOut);
        tween.onUpdate(() => {
            handGroup.position.set(obj.x, obj.y + Math.sin(Date.now() * 0.02) * 0.04, obj.z);
            piece.position.set(obj.x, obj.py + 0.26, obj.z);
        });
        tween.onComplete(() => {
            handGroup.visible = false;
            piece.position.set(end.x, 0.08, end.z);
            pieceMap.delete(from);
            pieceMap.set(to, piece);
            animating = false;
        });
        tween.start();
        TWEEN.update();
        await new Promise(r => setTimeout(r, 360));
        return true;
    }

    // --- Game state & AI ---
    let gameOver = false;
    let vsAI = false;
    let aiSkill = 14;
    let selectedSquare = null;
    let highlightTimeout = null;
    function clearHighlight() {
        squareMeshes.forEach(tile => tile.material.emissiveIntensity = 0);
    }
    function updateStatus() {
        const el = document.getElementById('gameStatus');
        if (gameOver) el.innerText = chess.in_checkmate() ? (chess.turn() === 'w' ? '🏆 Black Wins' : '🏆 White Wins') : 'Game Over';
        else el.innerText = `${chess.turn() === 'w' ? '⚪ White' : '⚫ Black'} to move`;
    }
    async function tryMove(from, to) {
        if (gameOver || animating) return false;
        const move = chess.move({ from, to, promotion: 'q' });
        if (!move) return false;
        await animatePieceMove(move.from, move.to);
        rebuildBoard();
        updateStatus();
        if (chess.game_over()) { gameOver = true; updateStatus(); return true; }
        if (vsAI && !gameOver && chess.turn() === 'b') {
            setTimeout(() => makeAIMove(), 200);
        }
        return true;
    }
    async function makeAIMove() {
        if (!vsAI || gameOver || animating || chess.turn() !== 'b') return;
        const sf = new Worker('https://cdn.jsdelivr.net/npm/stockfish@16.1.0/stockfish.js');
        sf.postMessage(`setoption name Skill Level value ${aiSkill}`);
        sf.postMessage(`position fen ${chess.fen()}`);
        sf.postMessage('go movetime 600');
        const bestMove = await new Promise(resolve => {
            sf.onmessage = e => {
                if (e.data && e.data.startsWith('bestmove')) {
                    resolve(e.data.split(' ')[1]);
                    sf.terminate();
                }
            };
            setTimeout(() => resolve(null), 1000);
        });
        if (bestMove && bestMove !== '(none)') {
            const move = chess.move(bestMove);
            if (move) {
                await animatePieceMove(move.from, move.to);
                rebuildBoard();
                updateStatus();
                if (chess.game_over()) gameOver = true;
            }
        }
    }

    // --- Click Interaction (reliable) ---
    const raycaster = new THREE.Raycaster();
    window.addEventListener('click', (e) => {
        if (gameOver || animating) return;
        const mouse = new THREE.Vector2(
            (e.clientX / renderer.domElement.clientWidth) * 2 - 1,
            -(e.clientY / renderer.domElement.clientHeight) * 2 + 1
        );
        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObjects(Array.from(squareMeshes.values()));
        if (intersects.length === 0) {
            clearHighlight();
            selectedSquare = null;
            return;
        }
        const hitTile = intersects[0].object;
        let clickedSquare = null;
        for (let [sq, mesh] of squareMeshes.entries()) {
            if (mesh === hitTile) { clickedSquare = sq; break; }
        }
        if (!clickedSquare) return;
        if (selectedSquare === null) {
            const piece = chess.get(clickedSquare);
            if (piece && piece.color === chess.turn()) {
                selectedSquare = clickedSquare;
                clearHighlight();
                const tile = squareMeshes.get(selectedSquare);
                if (tile) tile.material.emissiveIntensity = 0.6;
                // highlight legal moves
                const moves = chess.moves({ verbose: true });
                moves.forEach(m => {
                    if (m.from === selectedSquare) {
                        const targetTile = squareMeshes.get(m.to);
                        if (targetTile) targetTile.material.emissiveIntensity = 0.3;
                    }
                });
            } else {
                clearHighlight();
            }
        } else {
            // attempt move
            const success = await tryMove(selectedSquare, clickedSquare);
            clearHighlight();
            selectedSquare = null;
            if (!success) {
                // if move illegal and clicked on own piece, re-select
                const piece = chess.get(clickedSquare);
                if (piece && piece.color === chess.turn()) {
                    selectedSquare = clickedSquare;
                    const tile = squareMeshes.get(selectedSquare);
                    if (tile) tile.material.emissiveIntensity = 0.6;
                }
            }
        }
    });

    // --- UI Buttons ---
    document.getElementById('restartBtn').addEventListener('click', () => {
        chess.reset();
        rebuildBoard();
        gameOver = false;
        selectedSquare = null;
        clearHighlight();
        updateStatus();
        if (vsAI && chess.turn() === 'b') makeAIMove();
    });
    document.getElementById('aiToggleBtn').addEventListener('click', () => {
        vsAI = true;
        chess.reset();
        rebuildBoard();
        gameOver = false;
        selectedSquare = null;
        clearHighlight();
        updateStatus();
        if (chess.turn() === 'b') makeAIMove();
    });
    document.getElementById('pvpBtn').addEventListener('click', () => {
        vsAI = false;
        chess.reset();
        rebuildBoard();
        gameOver = false;
        selectedSquare = null;
        clearHighlight();
        updateStatus();
    });
    document.getElementById('skillSlider').addEventListener('input', (e) => aiSkill = parseInt(e.target.value));

    // --- Theme & Particles ---
    let particleSys = null;
    function setTheme(theme) {
        if (particleSys) scene.remove(particleSys);
        const count = 600;
        const geom = new THREE.BufferGeometry();
        const positions = new Float32Array(count * 3);
        for (let i = 0; i < count; i++) {
            positions[i*3] = (Math.random() - 0.5) * 22;
            positions[i*3+1] = Math.random() * 7;
            positions[i*3+2] = (Math.random() - 0.5) * 20;
        }
        geom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        let color = 0xa6d96a, bg = 0x081a2c;
        if (theme === 'autumn') { color = 0xe67e22; bg = 0x4a2a1a; }
        else if (theme === 'cherry') { color = 0xffa7c4; bg = 0x402335; }
        else if (theme === 'rainy') { color = 0x8f9bb3; bg = 0x2c3a4f; }
        const mat = new THREE.PointsMaterial({ color, size: 0.08, transparent: true, blending: THREE.AdditiveBlending });
        particleSys = new THREE.Points(geom, mat);
        scene.add(particleSys);
        scene.background.setHex(bg);
        scene.fog.color.setHex(bg);
    }
    setInterval(() => {
        if (particleSys && particleSys.geometry) {
            const posAttr = particleSys.geometry.attributes.position;
            const arr = posAttr.array;
            for (let i = 0; i < arr.length / 3; i++) {
                arr[i*3+1] -= 0.022;
                if (arr[i*3+1] < -0.8) {
                    arr[i*3+1] = 6;
                    arr[i*3] = (Math.random() - 0.5) * 22;
                    arr[i*3+2] = (Math.random() - 0.5) * 20;
                }
            }
            posAttr.needsUpdate = true;
        }
    }, 45);
    document.getElementById('themeNormal').addEventListener('click', () => setTheme('normal'));
    document.getElementById('themeAutumn').addEventListener('click', () => setTheme('autumn'));
    document.getElementById('themeCherry').addEventListener('click', () => setTheme('cherry'));
    document.getElementById('themeRainy').addEventListener('click', () => setTheme('rainy'));
    setTheme('normal');

    // --- PGN Analysis (full feature) ---
    const analyzeBtn = document.getElementById('analyzeBtn');
    const pgnInput = document.getElementById('pgnInput');
    const moveListDiv = document.getElementById('moveListAnalysis');
    async function analyzePGN(pgnText) {
        moveListDiv.innerHTML = '🔍 Analyzing with Stockfish...';
        const game = new Chess();
        if (!game.load_pgn(pgnText)) { moveListDiv.innerHTML = '❌ Invalid PGN'; return; }
        const moves = game.history({ verbose: true });
        if (!moves.length) { moveListDiv.innerHTML = 'No moves found.'; return; }
        const evals = [];
        for (let i = 0; i <= moves.length; i++) {
            const fen = i === 0 ? 'rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1' : game.fen();
            const engine = new Worker('https://cdn.jsdelivr.net/npm/stockfish@16.1.0/stockfish.js');
            engine.postMessage('setoption name Skill Level value 18');
            engine.postMessage(`position fen ${fen}`);
            let score = 0;
            await new Promise(resolve => {
                engine.postMessage('go depth 14');
                engine.onmessage = e => {
                    if (e.data && e.data.includes('cp')) {
                        score = parseInt(e.data.match(/cp (\d+)/)[1]) / 100;
                        resolve();
                        engine.terminate();
                    } else if (e.data && e.data.includes('mate')) resolve();
                };
                setTimeout(() => resolve(), 700);
            });
            evals.push(score);
            if (i < moves.length) game.move(moves[i]);
        }
        moveListDiv.innerHTML = '<div style="font-weight:bold; margin-bottom:8px;">📋 Move Classification</div>';
        for (let idx = 0; idx < moves.length; idx++) {
            const mv = moves[idx];
            const before = evals[idx];
            const after = evals[idx+1];
            const loss = mv.color === 'w' ? before - after : after - before;
            let label = '', cls = '';
            if (loss <= -0.9) { label = 'Blunder'; cls = 'blunder'; }
            else if (loss <= -0.5) { label = 'Mistake'; cls = 'mistake'; }
            else if (loss <= -0.25) { label = 'Inaccuracy'; cls = 'inaccuracy'; }
            else if (loss > 0.25) { label = 'Brilliant'; cls = 'brilliant'; }
            else if (loss > 0.08) { label = 'Great'; cls = 'great'; }
            else { label = 'Good'; cls = 'good'; }
            const moveNum = Math.floor(idx/2)+1;
            const moveStr = `${moveNum}.${mv.color === 'w' ? '' : '..'} ${mv.san}`;
            moveListDiv.innerHTML += `<div class="move-entry"><span>${moveStr}</span><span class="classification ${cls}">${label} (${loss > 0 ? '+' : ''}${loss.toFixed(2)})</span></div>`;
        }
    }
    analyzeBtn.addEventListener('click', () => { if (pgnInput.value.trim()) analyzePGN(pgnInput.value); });
    document.getElementById('pgnUpload').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (ev) => { pgnInput.value = ev.target.result; analyzePGN(ev.target.result); };
            reader.readAsText(file);
        }
    });

    rebuildBoard();
    updateStatus();

    function animate() {
        TWEEN.update();
        renderer.render(scene, camera);
        requestAnimationFrame(animate);
    }
    animate();
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
    console.log('Game ready — click pieces to move!');
</script>
</body>
</html>
